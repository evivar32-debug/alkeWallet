<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alka-Wallet Register</title>

    <!-- Codigos necesarios para Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- insertar CSS con mis estilos -->
    <link href="/asset/css/myStyle.css" rel="stylesheet">

    <!-- Agregar Font de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">

    <!-- Agregar icono -->
    <link rel="icon" type="image/x-icon" href="/asset/img/icon.png">

</head>

<body>
    <div id="titulo" class="container-fluid mb-3 ">
        <div>
            <h1 class="electrolize-regular p-2">Crear Usuario</h1>
        </div>
    </div>

    <!-- Agregar logo -->
    <div class="position-absolute top-0 end-0 " style="z-index: 1050;">
        <img src="/asset/img/logo2.png" class="img-fluid" style="width: 150px;" alt="Logo">
    </div>

    <!-- Form para el registro de nuevos usuarios -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4 electrolize-regular">Crear Cuenta</h2>
                <form id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="nombres" id="regNombres"
                                    placeholder="Juan" required>
                                <label for="regNombres" class="electrolize-regular">Nombres</label>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="apellidos" id="regApellidos"
                                    placeholder="Pérez" required>
                                <label for="regApellidos" class="electrolize-regular">Apellidos</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" name="email" id="regEmail"
                            placeholder="name@example.com" required>
                        <label for="regEmail" class="electrolize-regular">Correo electrónico</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" name="password" id="regPass"
                            placeholder="Contraseña" required minlength="8">
                        <label for="regPass" class="electrolize-regular">Contraseña (mín. 8 caracteres)</label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 electrolize-regular">Registrarse</button>
                    <p class="mt-3 text-center electrolize-regular">
                        ¿Ya tienes cuenta? <a href="/index.html">Inicia sesión aquí</a>
                    </p>
                </form>
            </div>
        </div>
    </div>






    <!-- Codigos necesario para bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <!-- Insertar mi Script js -->
    <script src="/asset/js/register.js"></script>

</body>

</html>
